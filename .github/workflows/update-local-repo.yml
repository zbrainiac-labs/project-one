name: Update Local Repository and Run Sonar Scanner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    uses: zbrainiac-labs/DataOpsBackbone/.github/workflows/dataops-pipeline.yml@main
    with:
      SOURCE_DATABASE: ONE_DEV
      SOURCE_SCHEMA: ONE_RAW_v001
      DCM_PROJECT_IDENTIFIER: ONE_DEV.ONE_DCM.PROJECT_ONE
      DCM_TARGET: DEV
      CLONE_PER_BUILD: true
    secrets: inherit
